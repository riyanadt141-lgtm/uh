<!doctype html>
<html>
  <head>
    <title>Calculator</title>

    <style>
      body {
        font-family: Arial;
        background: #e9e9e9;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .calculator {
        background: white;
        padding: 20px;
        border-radius: 10px;
        width: 260px;
      }

      .display {
        width: 100%;
        height: 50px;
        font-size: 24px;
        text-align: right;
        margin-bottom: 15px;
      }

      .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }

      button {
        height: 45px;
        font-size: 18px;
      }
    </style>
  </head>

  <body>
    <div class="calculator">
      <input id="tampilkan" class="display" readonly />

      <div class="buttons">
        <button onclick="input_number(7)">7</button>
        <button onclick="input_number(8)">8</button>
        <button onclick="input_number(9)">9</button>
        <button onclick="input_operasi('/')">/</button>

        <button onclick="input_number(4)">4</button>
        <button onclick="input_number(5)">5</button>
        <button onclick="input_number(6)">6</button>
        <button onclick="input_operasi('*')">*</button>

        <button onclick="input_number(1)">1</button>
        <button onclick="input_number(2)">2</button>
        <button onclick="input_number(3)">3</button>
        <button onclick="input_operasi('-')">-</button>

        <button onclick="input_number(0)">0</button>
        <button onclick="clean()">C</button>
        <button onclick="perhitungan()">=</button>
        <button onclick="input_operasi('+')">+</button>
      </div>
    </div>

    <script>
      var no1 = "";
      var no2 = "";
      var operasi = "";

      //input number
      function input_number(number) {
        document.getElementById("tampilkan").value =
          document.getElementById("tampilkan").value + number;
      }

      //inputan operasi
      function input_operasi(ope) {
        no1 = document.getElementById("tampilkan").value;
        operasi = ope;
        document.getElementById("tampilkan").value = "";
      }

      //Penghitungan
      function perhitungan() {
        no2 = document.getElementById("tampilkan").value;

        var hasil = 0;

        if (operasi == "+") {
          hasil = parseFloat(no1) + parseFloat(no2);
        }

        if (operasi == "-") {
          hasil = parseFloat(no1) - parseFloat(no2);
        }

        if (operasi == "*") {
          hasil = parseFloat(no1) * parseFloat(no2);
        }

        if (operasi == "/") {
          hasil = parseFloat(no1) / parseFloat(no2);
        }

        document.getElementById("tampilkan").value = hasil;
      }
      
      //Menghapus Semua
      function clean() {
        no1 = "";
        no2 = "";
        operasi = "";
        document.getElementById("tampilkan").value = "";
      }
    </script>
  </body>
</html>
